<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SimiPulse</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #131722; --brd: #2a2e39; --txt: #d1d4dc; --blue: #2962ff; }
        body { margin: 0; background: var(--bg); color: var(--txt); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        

        header { height: 52px; border-bottom: 1px solid var(--brd); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .left-head { display: flex; align-items: center; gap: 12px; }
        
        .logo-sp { background: var(--blue); color: white; font-weight: bold; padding: 4px 10px; border-radius: 4px; font-size: 18px; }
        
        .search-container { background: var(--brd); padding: 5px 10px; border-radius: 4px; display: flex; align-items: center; }
        .search-container input { background: transparent; border: none; color: white; outline: none; width: 110px; text-transform: uppercase; font-size: 13px; }
        
        .tf-group { display: flex; align-items: center; gap: 2px; }
        .tf-btn { background: transparent; color: var(--txt); border: none; padding: 6px 10px; cursor: pointer; border-radius: 4px; font-size: 13px; transition: 0.2s; }
        .tf-btn:hover { background: #363a45; }
        .tf-btn.active { background: var(--blue); color: white; }

        .login-btn { background: var(--blue); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }


        .main-content { display: flex; flex: 1; overflow: hidden; }
        #chart-container { flex: 1; }
        .watchlist { width: 280px; border-left: 1px solid var(--brd); }
        .watchlist-header { padding: 15px; font-weight: bold; border-bottom: 1px solid var(--brd); }
        .list-row { padding: 12px 15px; border-bottom: 1px solid #1e222d; display: flex; justify-content: space-between; cursor: pointer; }
        .list-row:hover { background: #1e222d; }
    </style>
</head>
<body>

    <header>
        <div class="left-head">
            <div class="logo-sp">SP</div>
            <div class="search-container">
                🔍 <input type="text" id="ticker-search" list="dynamic-ticker-list" placeholder="SEARCH">
                <datalist id="dynamic-ticker-list"></datalist>
            </div>
            <div class="tf-group" id="tf-buttons">
                <button class="tf-btn active" onclick="changeTimeframe('1m', this)">1m</button>
                <button class="tf-btn" onclick="changeTimeframe('5m', this)">5m</button>
                <button class="tf-btn" onclick="changeTimeframe('1h', this)">1h</button>
                <button class="tf-btn" onclick="changeTimeframe('4h', this)">4h</button>
                <button class="tf-btn" onclick="changeTimeframe('1d', this)">D</button>
                <button class="tf-btn" onclick="changeTimeframe('1w', this)">W</button>
                <button class="tf-btn" onclick="changeTimeframe('1M', this)">M</button>
            </div>
        </div>
        <button class="login-btn" onclick="redirectToCognito()">Sign In</button>
    </header>

    <div class="main-content">
        <div id="chart-container"></div>
        <div class="watchlist">
            <div class="watchlist-header">WATCHLIST</div>
            <div class="list-row">
                <span id="active-symbol">BTCUSDT</span>
                <span id="active-price" style="color: #26a69a; font-weight: bold;">---</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://d1cql0z1kk6brp.cloudfront.net";
        let currentTicker = "BTCUSDT";
        let currentTimeframe = "1m";
        let liveInterval = null;

        // 1. Binance Tickers
        async function fetchAllBinanceTickers() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await response.json();
                const datalist = document.getElementById('dynamic-ticker-list');
                data.symbols.filter(s => s.symbol.endsWith('USDT') && s.status === 'TRADING').forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.symbol;
                    datalist.appendChild(opt);
                });
            } catch (e) { console.error(e); }
        }

        // 2. Chart Setup
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
            timeScale: { timeVisible: true, secondsVisible: false }
        });
        const candleSeries = chart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350', borderVisible: false });

        async function loadChart(ticker, tf = currentTimeframe) {
            currentTicker = ticker.toUpperCase();
            currentTimeframe = tf;
            document.getElementById('active-symbol').innerText = currentTicker;
            if (liveInterval) clearInterval(liveInterval);

            try {
                const res = await fetch(`${API_URL}/api/history/${currentTicker}?interval=${currentTimeframe}`);
                const history = await res.json();
                if (history && Array.isArray(history)) {
                    history.sort((a, b) => a.k.t - b.k.t);
                    candleSeries.setData(history.map(item => ({
                        time: Math.floor(item.k.t / 1000),
                        open: parseFloat(item.k.o), high: parseFloat(item.k.h), low: parseFloat(item.k.l), close: parseFloat(item.k.c)
                    })));
                }
                
                liveInterval = setInterval(async () => {
                    try {
                        const res = await fetch(`${API_URL}/api/live/${currentTicker}?interval=${currentTimeframe}`);
                        const data = await res.json();
                        if(data && data.k) {
                            const price = parseFloat(data.k.c);
                            candleSeries.update({
                                time: Math.floor(data.k.t / 1000),
                                open: parseFloat(data.k.o), high: parseFloat(data.k.h), low: parseFloat(data.k.l), close: price
                            });
                            document.getElementById('active-price').innerText = price.toLocaleString();
                        }
                    } catch(e) {}
                }, 1000);
            } catch (e) { console.error(e); }
        }

        function changeTimeframe(tf, btn) {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadChart(currentTicker, tf);
        }

        document.getElementById('ticker-search').onkeypress = (e) => { 
            if(e.key === 'Enter') { loadChart(e.target.value); } 
        };

        function redirectToCognito() {
            const DOMAIN = "eu-north-1svqk5eywa.auth.eu-north-1.amazoncognito.com";
            const CLIENT_ID = "7d47a9slic2r3k2gjr5cm45ef6";
            const REDIRECT_URI = "https://d3h4lvzeltrcpw.cloudfront.net/callback.html";
            window.location.href = `https://${DOMAIN}/login?client_id=${CLIENT_ID}&response_type=token&scope=email+openid+phone&redirect_uri=${REDIRECT_URI}`;
        }

        fetchAllBinanceTickers();
        loadChart(currentTicker);
        window.onresize = () => chart.resize(document.getElementById('chart-container').clientWidth, document.getElementById('chart-container').clientHeight);
    </script>
</body>
</html>
