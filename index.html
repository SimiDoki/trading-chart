<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Saját Trading Chart</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #1e222d; color: white; font-family: sans-serif; padding: 20px; }
        #chart { width: 100%; height: 600px; }
    </style>
</head>
<body>

    <h2>BTCUSDT Élő Grafikon</h2>
    <div id="chart"></div>

    <script>
        // Grafikon inicializálása
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { textColor: 'white', background: { type: 'solid', color: '#1e222d' } },
            timeScale: {
                timeVisible: true,
                secondsVisible: false
            }
        });
        
        // Gyertyák megadása 
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
            wickUpColor: '#26a69a', wickDownColor: '#ef5350'
        });

        const API_URL = "http://3.69.31.243"; // Az IP címed marad!

        async function loadChart() {
            try {
                // Múlt betöltése az S3-ból
                const res = await fetch(`${API_URL}/api/history/BTCUSDT`);
                const history = await res.json();
                
                // NYOMKÖVETÉS: Kiírjuk a konzolba, mit kaptunk az API-tól
                console.log("S3-ból letöltött gyertyák száma:", history.length);
                console.log("S3 nyers adat:", history);
                
                if (history && history.length > 0) {
                    history.sort((a, b) => a.k.t - b.k.t);
                    
                    candleSeries.setData(history.map(item => ({
                        time: Math.floor(item.k.t / 1000), 
                        open: parseFloat(item.k.o), 
                        high: parseFloat(item.k.h), 
                        low: parseFloat(item.k.l), 
                        close: parseFloat(item.k.c)
                    })));
                }

                // Élő frissítés indítása a Redisből
                setInterval(async () => {
                    const liveRes = await fetch(`${API_URL}/api/live/BTCUSDT`);
                    const data = await liveRes.json();
                    
                    if(data && data.k && data.k.t) {
                        candleSeries.update({
                            time: Math.floor(data.k.t / 1000), 
                            open: parseFloat(data.k.o), 
                            high: parseFloat(data.k.h), 
                            low: parseFloat(data.k.l), 
                            close: parseFloat(data.k.c)
                        });
                    }
                }, 1000);
            } catch (error) {
                console.error("Hiba a betöltéskor:", error);
            }
        }

        // 3. Program indítása
        loadChart();
    </script>
</body>
</html>
