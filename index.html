<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TradingView Clone - Dynamic Search</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg-color: #131722; --border-color: #2a2e39; --text-color: #d1d4dc; --active-color: #2962ff; }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { height: 52px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .left-head { display: flex; align-items: center; gap: 15px; }
        
        .search-container { background: #2a2e39; border-radius: 4px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; }
        .search-container input { background: transparent; border: none; color: white; outline: none; width: 180px; text-transform: uppercase; }

        .tf-dropdown { background: #2a2e39; color: white; border: 1px solid var(--border-color); border-radius: 4px; padding: 5px; cursor: pointer; }
        .login-btn { background: var(--active-color); color: white; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .main-content { display: flex; flex: 1; overflow: hidden; }
        #chart-container { flex: 1; }

        .watchlist { width: 280px; border-left: 1px solid var(--border-color); }
        .watchlist-header { padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border-color); }
        .list-row { padding: 12px 15px; border-bottom: 1px solid #1e222d; display: flex; justify-content: space-between; cursor: pointer; }
        .list-row:hover { background: #1e222d; }
        .price-val { font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="left-head">
            <div style="font-weight: bold; color: var(--active-color); font-size: 22px;">TV</div>
            <div class="search-container">
                🔍 <input type="text" id="ticker-search" list="dynamic-ticker-list" placeholder="Search (eg. SOL, PEPE)...">
                <datalist id="dynamic-ticker-list"></datalist>
            </div>
            <select class="tf-dropdown" onchange="changeTimeframe(this.value)">
                <option value="1m">1 min</option>
                <option value="5m">5 min</option>
                <option value="1h">1 hour</option>
                <option value="1d">1 day</option>
            </select>
        </div>
        <button class="login-btn" onclick="redirectToCognito()">Sign In</button>
    </header>

    <div class="main-content">
        <div id="chart-container"></div>
        <div class="watchlist">
            <div class="watchlist-header">WATCHLIST</div>
            <div class="list-row" id="active-row">
                <span id="active-symbol">BTCUSDT</span>
                <span class="price-val" id="active-price" style="color: #26a69a;">---</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://d1cql0z1kk6brp.cloudfront.net";
        let currentTicker = "BTCUSDT";
        let currentTimeframe = "1m";
        let liveInterval = null;

        // --- 1. MINDEN BINANCE TICKER LEKÉRÉSE ---
        async function fetchAllBinanceTickers() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await response.json();
                const datalist = document.getElementById('dynamic-ticker-list');
                
                // Csak az USDT-re végződő, aktív párokat tesszük be
                const usdtPairs = data.symbols
                    .filter(s => s.symbol.endsWith('USDT') && s.status === 'TRADING')
                    .map(s => s.symbol);

                usdtPairs.forEach(symbol => {
                    const option = document.createElement('option');
                    option.value = symbol;
                    datalist.appendChild(option);
                });
                console.log(`${usdtPairs.length} tickers loaded from Binance.`);
            } catch (e) {
                console.error("Failed to fetch Binance tickers", e);
            }
        }

        // --- 2. GRAFIKON ÉS ÉLŐ ADATOK ---
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
            timeScale: { timeVisible: true, secondsVisible: false }
        });
        const candleSeries = chart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350', borderVisible: false });

        async function loadChart(ticker, tf = currentTimeframe) {
            currentTicker = ticker.toUpperCase();
            currentTimeframe = tf;
            document.getElementById('active-symbol').innerText = currentTicker;
            
            if (liveInterval) clearInterval(liveInterval);

            try {
                const res = await fetch(`${API_URL}/api/history/${currentTicker}?interval=${currentTimeframe}`);
                const history = await res.json();
                if (history && Array.isArray(history)) {
                    history.sort((a, b) => a.k.t - b.k.t);
                    candleSeries.setData(history.map(item => ({
                        time: Math.floor(item.k.t / 1000),
                        open: parseFloat(item.k.o), high: parseFloat(item.k.h), low: parseFloat(item.k.l), close: parseFloat(item.k.c)
                    })));
                }
                
                liveInterval = setInterval(async () => {
                    try {
                        const res = await fetch(`${API_URL}/api/live/${currentTicker}?interval=${currentTimeframe}`);
                        const data = await res.json();
                        if(data && data.k) {
                            const price = parseFloat(data.k.c);
                            candleSeries.update({
                                time: Math.floor(data.k.t / 1000),
                                open: parseFloat(data.k.o), high: parseFloat(data.k.h), low: parseFloat(data.k.l), close: price
                            });
                            document.getElementById('active-price').innerText = price.toLocaleString();
                        }
                    } catch(e) {}
                }, 1000);
            } catch (e) { console.error(e); }
        }

        function changeTicker(t) { 
            document.getElementById('ticker-search').value = t; 
            loadChart(t); 
        }

        function changeTimeframe(tf) { loadChart(currentTicker, tf); }

        document.getElementById('ticker-search').onkeypress = (e) => { 
            if(e.key === 'Enter') changeTicker(e.target.value); 
        };

        function redirectToCognito() {
            const DOMAIN = "eu-north-1svqk5eywa.auth.eu-north-1.amazoncognito.com";
            const CLIENT_ID = "7d47a9slic2r3k2gjr5cm45ef6";
            const REDIRECT_URI = "https://d3h4lvzeltrcpw.cloudfront.net/callback.html";

            const authUrl = `https://${DOMAIN}/login?client_id=${CLIENT_ID}&response_type=token&scope=email+openid+phone&redirect_uri=${REDIRECT_URI}`;

            window.location.href = authUrl;
        }

        // --- INDÍTÁS ---
        fetchAllBinanceTickers(); // Betölti a listát a háttérben
        loadChart(currentTicker);

        window.onresize = () => chart.resize(document.getElementById('chart-container').clientWidth, document.getElementById('chart-container').clientHeight);
    </script>
</body>
</html>
