apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-api
  template:
    metadata:
      labels:
        app: trading-api
    spec:
      hostNetwork: true
      containers:
      - name: trading-api
        image: simipulse-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: trading-api-service
spec:
  selector:
    app: trading-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer