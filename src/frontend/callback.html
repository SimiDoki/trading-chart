<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimiPulse - Azonosítás...</title>
    <style>
        body { background: #0b0e11; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e222d; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #2a2e39; }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: #2962ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-text { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
        .sub-text { font-size: 14px; color: #848e9c; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <div class="status-text">Biztonságos belépés...</div>
        <div class="sub-text">Munkamenet ellenőrzése a Cognitóval</div>
    </div>

    <script>
        function processAuth() {
            // Megkeressük a tokent az URL fragmentben (#)
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            
            const idToken = params.get('id_token');
            const accessToken = params.get('access_token');

            if (idToken && accessToken) {
                // Mentés
                localStorage.setItem('id_token', idToken);
                localStorage.setItem('access_token', accessToken);
                
                // Tisztítás: visszaugrunk a főoldalra, de a hash nélkül
                window.location.replace('index.html');
            } else {
                // Ha valaki csak úgy idetévedt token nélkül
                document.querySelector('.status-text').innerText = "Hoppá!";
                document.querySelector('.sub-text').innerText = "Nincs érvényes belépési kód. Visszairányítás...";
                setTimeout(() => window.location.replace('index.html'), 3000);
            }
        }

        // Futtatás azonnal
        processAuth();
    </script>
</body>
</html>
